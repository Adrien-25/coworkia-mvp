spring.application.name=coworkia-backend

# Database configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/coworkia}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JWT configuration
app.jwt.secret=${JWT_SECRET:change-me-in-production}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:43200000}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Better logging for connection issues
logging.level.org.hibernate.engine.jdbc.env.internal.JdbcEnvironmentInitiator=DEBUG
